<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Voice Call - 실시간 음성통화</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin: 20px 0; font-size: 1.8em; }
        .status {
            padding: 10px 20px;
            border-radius: 20px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .status.connected { background: #2ecc71; }
        .status.disconnected { background: #e74c3c; }
        .status.listening { background: #3498db; animation: pulse 1.5s infinite; }
        .status.processing { background: #f39c12; }
        .status.speaking { background: #9b59b6; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .call-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            transition: all 0.3s;
        }
        .mic-button:hover { transform: scale(1.05); }
        .mic-button.active {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
            animation: pulse 1s infinite;
        }
        .mic-button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .conversation {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            max-width: 80%;
        }
        .message.user {
            background: #3498db;
            margin-left: auto;
            text-align: right;
        }
        .message.gd {
            background: #9b59b6;
        }
        .message .label {
            font-size: 0.75em;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .visualizer {
            width: 300px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #waveform {
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-reset { background: #e74c3c; color: white; }
        .btn-settings { background: #34495e; color: white; }

        .settings {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }
        .settings label { display: block; margin: 10px 0 5px; font-size: 0.9em; }
        .settings input, .settings select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .metrics {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 10px;
        }

        .debug {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>🎤 GD Voice Call</h1>

    <div id="status" class="status disconnected">연결 중...</div>

    <div class="call-container">
        <div class="visualizer">
            <canvas id="waveform"></canvas>
        </div>

        <button id="micBtn" class="mic-button" disabled>🎤</button>
        <p id="instruction">마이크 버튼을 누르고 말하세요</p>
    </div>

    <div class="conversation" id="conversation"></div>

    <div class="metrics" id="metrics"></div>
    <div class="debug" id="debug"></div>

    <div class="controls">
        <button class="btn-reset" onclick="resetConversation()">🔄 대화 초기화</button>
        <button class="btn-settings" onclick="toggleSettings()">⚙️ 설정</button>
    </div>

    <div class="settings" id="settings" style="display:none;">
        <label>서버 주소</label>
        <input type="text" id="serverHost" value="localhost:5002">
        <label>음성 ID</label>
        <select id="voiceId">
            <option value="gd-icl">GD ICL (고품질)</option>
            <option value="gd-default">GD Default (빠름)</option>
        </select>
        <label>침묵 감지 시간 (ms)</label>
        <input type="number" id="silenceThreshold" value="1500" min="500" max="5000">
        <label>최소 녹음 시간 (ms)</label>
        <input type="number" id="minRecordTime" value="1000" min="500" max="3000">
    </div>

    <script>
        // === 상태 관리 ===
        let ws = null;
        let mediaRecorder = null;
        let audioContext = null;
        let analyser = null;
        let audioChunks = [];
        let isRecording = false;
        let silenceTimer = null;
        let lastSoundTime = Date.now();
        let recordingStartTime = 0;
        let hasSpeechStarted = false;  // 음성 시작 여부 추적

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const instructionEl = document.getElementById('instruction');
        const conversationEl = document.getElementById('conversation');
        const metricsEl = document.getElementById('metrics');
        const debugEl = document.getElementById('debug');
        const canvas = document.getElementById('waveform');
        const canvasCtx = canvas.getContext('2d');

        // === WebSocket 연결 ===
        function connect() {
            const host = document.getElementById('serverHost').value;
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${host}/ws/voice/call`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
            };

            ws.onmessage = async (event) => {
                if (event.data instanceof Blob) {
                    // 오디오 청크 수신
                    handleAudioChunk(event.data);
                } else {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                }
            };

            ws.onclose = () => {
                setStatus('disconnected', '연결 끊김');
                micBtn.disabled = true;
                setTimeout(connect, 3000); // 재연결
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                setStatus('disconnected', '연결 오류');
            };
        }

        // === 메시지 처리 ===
        function handleMessage(data) {
            console.log('Received:', data);

            switch (data.type) {
                case 'connected':
                    setStatus('connected', '연결됨 - 마이크를 눌러 말하세요');
                    micBtn.disabled = false;
                    break;

                case 'transcription':
                    if (data.text && data.text !== '...') {
                        addMessage('user', data.text);
                    }
                    setStatus('processing', 'GD가 생각 중...');
                    break;

                case 'response_start':
                    setStatus('speaking', 'GD가 말하는 중...');
                    break;

                case 'response_text':
                    // 텍스트 스트리밍 (optional)
                    break;

                case 'response_end':
                    const metrics = data.metrics || {};
                    addMessage('gd', metrics.response_text || '');
                    showMetrics(metrics);
                    setStatus('connected', '대화 완료 - 다시 말하세요');
                    playCollectedAudio();
                    break;

                case 'error':
                    setStatus('disconnected', `오류: ${data.message}`);
                    addMessage('gd', `⚠️ ${data.message}`);
                    break;
            }
        }

        // === 실시간 오디오 스트리밍 재생 (안정화 버전) ===
        let audioQueue = [];
        let isPlaying = false;
        let playbackAudioContext = null;
        let nextPlayTime = 0;
        let totalChunksReceived = 0;
        let totalChunksScheduled = 0;  // 스케줄된 청크 수
        let chunksFinished = 0;  // 재생 완료된 청크 수
        let firstChunkTime = 0;
        let isProcessingQueue = false;
        let responseComplete = false;
        let lastSourceNode = null;  // 마지막 오디오 소스 추적

        async function initPlaybackContext() {
            if (!playbackAudioContext || playbackAudioContext.state === 'closed') {
                playbackAudioContext = new AudioContext({ sampleRate: 24000 });
                nextPlayTime = 0;
            }
            if (playbackAudioContext.state === 'suspended') {
                await playbackAudioContext.resume();
            }
            return playbackAudioContext;
        }

        async function handleAudioChunk(blob) {
            totalChunksReceived++;

            // 첫 청크 시간 기록
            if (totalChunksReceived === 1) {
                firstChunkTime = Date.now();
                debugEl.textContent = `🎵 첫 오디오 수신! TTFA 측정 중...`;
                await initPlaybackContext();
                nextPlayTime = playbackAudioContext.currentTime;
            }

            // PCM 데이터 추출
            const arrayBuffer = await blob.arrayBuffer();
            console.log(`Chunk ${totalChunksReceived}: ${arrayBuffer.byteLength} bytes received`);
            const pcmData = new Int16Array(arrayBuffer);

            // Float32로 변환 (정규화)
            const floatData = new Float32Array(pcmData.length);
            for (let i = 0; i < pcmData.length; i++) {
                floatData[i] = pcmData[i] / 32768.0;
            }

            // 큐에 추가
            audioQueue.push(floatData);

            debugEl.textContent = `🎵 청크 ${totalChunksReceived}개 수신`;

            // 즉시 재생 시작
            if (!isProcessingQueue) {
                processAudioQueue();
            }
        }

        async function processAudioQueue() {
            if (isProcessingQueue) return;
            isProcessingQueue = true;
            isPlaying = true;

            const ctx = await initPlaybackContext();

            while (audioQueue.length > 0) {
                const floatData = audioQueue.shift();
                totalChunksScheduled++;
                const chunkNum = totalChunksScheduled;

                // AudioBuffer 생성
                const audioBuffer = ctx.createBuffer(1, floatData.length, 24000);
                audioBuffer.getChannelData(0).set(floatData);

                // 재생 스케줄링
                const startTime = Math.max(ctx.currentTime + 0.01, nextPlayTime);

                const source = ctx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ctx.destination);

                // 재생 완료 추적
                source.onended = () => {
                    chunksFinished++;
                    console.log(`Chunk #${chunkNum} finished (${chunksFinished}/${totalChunksScheduled})`);

                    // 응답 완료 + 모든 청크 재생 완료 시 리셋
                    if (responseComplete && chunksFinished >= totalChunksScheduled) {
                        console.log('All audio chunks finished, resetting...');
                        setTimeout(() => resetAudioPlayback(), 300);
                    }
                };

                source.start(startTime);
                lastSourceNode = source;
                nextPlayTime = startTime + audioBuffer.duration;

                console.log(`Chunk #${chunkNum} scheduled at ${startTime.toFixed(2)}s, duration: ${audioBuffer.duration.toFixed(2)}s`);
            }

            isProcessingQueue = false;
        }

        function resetAudioPlayback() {
            console.log(`Reset: received=${totalChunksReceived}, scheduled=${totalChunksScheduled}, finished=${chunksFinished}`);
            audioQueue = [];
            isPlaying = false;
            isProcessingQueue = false;
            totalChunksReceived = 0;
            totalChunksScheduled = 0;
            chunksFinished = 0;
            firstChunkTime = 0;
            nextPlayTime = 0;
            responseComplete = false;
            lastSourceNode = null;
        }

        // 응답 완료 시 호출
        async function playCollectedAudio() {
            console.log(`Response complete! Received: ${totalChunksReceived}, Scheduled: ${totalChunksScheduled}, Finished: ${chunksFinished}`);
            responseComplete = true;

            // 아직 큐에 남은 청크가 있으면 처리
            if (audioQueue.length > 0 && !isProcessingQueue) {
                await processAudioQueue();
            }

            debugEl.textContent = `✅ 응답 완료: ${totalChunksScheduled}개 청크 재생 중...`;

            // 모든 청크가 이미 재생 완료된 경우 바로 리셋
            if (chunksFinished >= totalChunksScheduled && totalChunksScheduled > 0) {
                console.log('All chunks already finished, resetting immediately');
                setTimeout(() => resetAudioPlayback(), 300);
            }
            // 아직 재생 중이면 onended 콜백에서 리셋 처리
        }

        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * bitsPerSample / 8;
            const blockAlign = numChannels * bitsPerSample / 8;
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // WAV 헤더
            const writeString = (offset, str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            // PCM 데이터
            const pcmView = new Uint8Array(buffer, 44);
            pcmView.set(pcmData);

            return new Blob([buffer], { type: 'audio/wav' });
        }

        // === 마이크 녹음 ===
        async function startRecording() {
            try {
                // 브라우저 기본 샘플레이트 사용 (보통 44100 또는 48000)
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                // AudioContext 생성 (브라우저 기본 샘플레이트 사용)
                audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                debugEl.textContent = `샘플레이트: ${audioContext.sampleRate}Hz`;

                // MediaRecorder 설정
                const options = { mimeType: 'audio/webm;codecs=opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'audio/webm';
                }
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const recordingDuration = Date.now() - recordingStartTime;
                    debugEl.textContent = `녹음 시간: ${recordingDuration}ms, 청크: ${audioChunks.length}개`;

                    if (audioChunks.length > 0 && recordingDuration > 500) {
                        await sendAudio();
                    } else {
                        setStatus('connected', '너무 짧음 - 다시 말하세요');
                    }
                };

                mediaRecorder.start(250); // 250ms 청크
                isRecording = true;
                recordingStartTime = Date.now();
                lastSoundTime = Date.now();
                hasSpeechStarted = false;
                micBtn.classList.add('active');
                setStatus('listening', '듣는 중... 말씀하세요');

                // 시각화 시작
                visualize();

                // 침묵 감지 시작 (최소 녹음 시간 후)
                const minRecordTime = parseInt(document.getElementById('minRecordTime').value) || 1000;
                setTimeout(() => {
                    if (isRecording) {
                        detectSilence();
                    }
                }, minRecordTime);

            } catch (err) {
                console.error('Microphone error:', err);
                setStatus('disconnected', '마이크 접근 오류: ' + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
            }
            isRecording = false;
            micBtn.classList.remove('active');
            clearTimeout(silenceTimer);
        }

        // === 침묵 감지 (VAD) ===
        function detectSilence() {
            if (!isRecording || !analyser) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const threshold = 10; // 침묵 임계값 (낮춤)
            const silenceTime = parseInt(document.getElementById('silenceThreshold').value) || 1500;
            const minRecordTime = parseInt(document.getElementById('minRecordTime').value) || 1000;
            const recordingDuration = Date.now() - recordingStartTime;

            // 음성이 감지되면 표시
            if (average > threshold) {
                lastSoundTime = Date.now();
                hasSpeechStarted = true;
                instructionEl.textContent = `말하는 중... (볼륨: ${Math.round(average)})`;
            } else {
                const silenceDuration = Date.now() - lastSoundTime;
                instructionEl.textContent = `침묵 ${(silenceDuration/1000).toFixed(1)}초... (볼륨: ${Math.round(average)})`;

                // 최소 녹음 시간 이후 + 음성 시작됨 + 침묵 지속
                if (recordingDuration > minRecordTime && hasSpeechStarted && silenceDuration > silenceTime) {
                    console.log(`Silence detected after ${recordingDuration}ms recording, sending audio...`);
                    stopRecording();
                    return;
                }
            }

            requestAnimationFrame(detectSilence);
        }

        // === 오디오 시각화 ===
        function visualize() {
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            function draw() {
                if (!isRecording) {
                    canvasCtx.fillStyle = 'rgba(255,255,255,0.1)';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                    return;
                }

                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = 'rgba(26, 26, 46, 0.3)';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    const hue = (i / bufferLength) * 120 + 200;
                    canvasCtx.fillStyle = `hsl(${hue}, 70%, 60%)`;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }

            draw();
        }

        // === 오디오 전송 ===
        async function sendAudio() {
            if (audioChunks.length === 0) return;

            setStatus('processing', '음성 처리 중...');

            // WebM Blob 생성
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            audioChunks = [];

            debugEl.textContent = `전송 중: ${(blob.size / 1024).toFixed(1)}KB`;

            try {
                const arrayBuffer = await blob.arrayBuffer();

                // AudioContext가 닫혀있으면 새로 생성
                if (!audioContext || audioContext.state === 'closed') {
                    audioContext = new AudioContext();
                }

                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));

                debugEl.textContent = `디코딩: ${audioBuffer.duration.toFixed(2)}s @ ${audioBuffer.sampleRate}Hz`;

                // 16kHz로 리샘플링
                const targetSampleRate = 16000;
                const resampled = resampleAudio(audioBuffer, targetSampleRate);

                // PCM 16-bit로 변환
                const pcmData = audioBufferToPcm16(resampled);
                const base64 = arrayBufferToBase64(pcmData);

                debugEl.textContent = `전송: ${(pcmData.byteLength / 1024).toFixed(1)}KB PCM (${(resampled.length / targetSampleRate).toFixed(2)}s)`;

                // WebSocket으로 전송
                ws.send(JSON.stringify({
                    type: 'voice_input',
                    audio: base64,
                    voice_id: document.getElementById('voiceId').value
                }));

            } catch (err) {
                console.error('Audio processing error:', err);
                setStatus('disconnected', '오디오 처리 오류: ' + err.message);
                debugEl.textContent = `오류: ${err.message}`;
            }
        }

        // 리샘플링 함수 (브라우저 샘플레이트 → 16kHz)
        function resampleAudio(audioBuffer, targetSampleRate) {
            const sourceSampleRate = audioBuffer.sampleRate;
            const sourceData = audioBuffer.getChannelData(0);

            if (sourceSampleRate === targetSampleRate) {
                return sourceData;
            }

            const ratio = sourceSampleRate / targetSampleRate;
            const newLength = Math.round(sourceData.length / ratio);
            const result = new Float32Array(newLength);

            for (let i = 0; i < newLength; i++) {
                const sourceIndex = i * ratio;
                const index = Math.floor(sourceIndex);
                const fraction = sourceIndex - index;

                if (index + 1 < sourceData.length) {
                    // 선형 보간
                    result[i] = sourceData[index] * (1 - fraction) + sourceData[index + 1] * fraction;
                } else {
                    result[i] = sourceData[index];
                }
            }

            return result;
        }

        function audioBufferToPcm16(samples) {
            const pcm = new Int16Array(samples.length);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm.buffer;
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // === UI 헬퍼 ===
        function setStatus(state, text) {
            statusEl.className = `status ${state}`;
            statusEl.textContent = text;
        }

        function addMessage(role, text) {
            if (!text || text === '...') return;
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="label">${role === 'user' ? '나' : 'GD'}</div>${text}`;
            conversationEl.appendChild(div);
            conversationEl.scrollTop = conversationEl.scrollHeight;
        }

        function showMetrics(m) {
            metricsEl.innerHTML = `STT: ${m.stt_ms || 0}ms | LLM: ${m.llm_ttfa_ms || 0}ms | Total: ${m.total_ms || 0}ms`;
        }

        function resetConversation() {
            conversationEl.innerHTML = '';
            metricsEl.innerHTML = '';
            debugEl.innerHTML = '';
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'reset' }));
            }
        }

        function toggleSettings() {
            const settings = document.getElementById('settings');
            settings.style.display = settings.style.display === 'none' ? 'block' : 'none';
        }

        // === 이벤트 핸들러 ===
        micBtn.onclick = () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        };

        // === 초기화 ===
        connect();
    </script>
</body>
</html>
