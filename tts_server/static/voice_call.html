<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call - мӢӨмӢңк°„ мқҢм„ұнҶөнҷ”</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin: 20px 0; font-size: 1.8em; }
        .status {
            padding: 10px 20px;
            border-radius: 20px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .status.connected { background: #2ecc71; }
        .status.disconnected { background: #e74c3c; }
        .status.listening { background: #3498db; animation: pulse 1.5s infinite; }
        .status.processing { background: #f39c12; }
        .status.speaking { background: #9b59b6; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .call-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            transition: all 0.3s;
        }
        .mic-button:hover { transform: scale(1.05); }
        .mic-button.active {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
            animation: pulse 1s infinite;
        }
        .mic-button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .conversation {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            max-width: 80%;
        }
        .message.user {
            background: #3498db;
            margin-left: auto;
            text-align: right;
        }
        .message.gd {
            background: #9b59b6;
        }
        .message .label {
            font-size: 0.75em;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .visualizer {
            width: 300px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #waveform {
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-reset { background: #e74c3c; color: white; }
        .btn-settings { background: #34495e; color: white; }

        .settings {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }
        .settings label { display: block; margin: 10px 0 5px; font-size: 0.9em; }
        .settings input, .settings select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .metrics {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 10px;
        }

        .debug {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="character-header" id="characterHeader">
        <a href="/phonebook" class="back-btn">вҶҗ м „нҷ”лІҲнҳёл¶Җ</a>
        <div class="character-info">
            <span class="character-avatar" id="charAvatar">рҹ‘Ө</span>
            <span class="character-name" id="charName">м—°кІ° мӨ‘...</span>
        </div>
    </div>
    <style>
        .character-header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .back-btn {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9em;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .character-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .character-avatar {
            font-size: 1.5em;
        }
        .character-name {
            font-size: 1.2em;
            font-weight: 600;
        }
    </style>

    <h1>рҹҺӨ Voice Call</h1>

    <div id="status" class="status disconnected">м—°кІ° мӨ‘...</div>

    <div class="call-container">
        <div class="visualizer">
            <canvas id="waveform"></canvas>
        </div>

        <button id="micBtn" class="mic-button" disabled>рҹҺӨ</button>
        <p id="instruction">л§ҲмқҙнҒ¬ лІ„нҠјмқ„ лҲ„лҘҙкі  л§җн•ҳм„ёмҡ”</p>
    </div>

    <div class="conversation" id="conversation"></div>

    <div class="metrics" id="metrics"></div>
    <div class="debug" id="debug"></div>

    <div class="controls">
        <button class="btn-reset" onclick="resetConversation()">рҹ”„ лҢҖнҷ” мҙҲкё°нҷ”</button>
        <button class="btn-settings" onclick="toggleSettings()">вҡҷпёҸ м„Өм •</button>
    </div>

    <div class="settings" id="settings" style="display:none;">
        <label>м„ңлІ„ мЈјмҶҢ</label>
        <input type="text" id="serverHost" value="localhost:5002">
        <label>мқҢм„ұ ID</label>
        <select id="voiceId">
            <option value="gd-icl">GD ICL (кі н’Ҳм§Ҳ)</option>
            <option value="gd-default">GD Default (л№ лҰ„)</option>
        </select>
        <label>м№Ёл¬ө к°җм§Җ мӢңк°„ (ms)</label>
        <input type="number" id="silenceThreshold" value="1500" min="500" max="5000">
        <label>мөңмҶҢ л…№мқҢ мӢңк°„ (ms)</label>
        <input type="number" id="minRecordTime" value="1000" min="500" max="3000">
    </div>

    <script>
        // === мғҒнғң кҙҖлҰ¬ ===
        let ws = null;
        let mediaRecorder = null;
        let audioContext = null;
        let analyser = null;
        let audioChunks = [];
        let isRecording = false;
        let silenceTimer = null;
        let lastSoundTime = Date.now();
        let recordingStartTime = 0;
        let hasSpeechStarted = false;  // мқҢм„ұ мӢңмһ‘ м—¬л¶Җ м¶”м Ғ

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const instructionEl = document.getElementById('instruction');
        const conversationEl = document.getElementById('conversation');
        const metricsEl = document.getElementById('metrics');
        const debugEl = document.getElementById('debug');
        const canvas = document.getElementById('waveform');
        const canvasCtx = canvas.getContext('2d');

        // === WebSocket м—°кІ° ===
        function connect() {
            const host = document.getElementById('serverHost').value;
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${host}/ws/voice/call`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
            };

            ws.onmessage = async (event) => {
                if (event.data instanceof Blob) {
                    // мҳӨл””мҳӨ мІӯнҒ¬ мҲҳмӢ 
                    handleAudioChunk(event.data);
                } else {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                }
            };

            ws.onclose = () => {
                setStatus('disconnected', 'м—°кІ° лҒҠк№Җ');
                micBtn.disabled = true;
                setTimeout(connect, 3000); // мһ¬м—°кІ°
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                setStatus('disconnected', 'м—°кІ° мҳӨлҘҳ');
            };
        }

        // === л©”мӢңм§Җ мІҳлҰ¬ ===
        function handleMessage(data) {
            console.log('Received:', data);

            switch (data.type) {
                case 'connected':
                    setStatus('connected', 'м—°кІ°лҗЁ - л§ҲмқҙнҒ¬лҘј лҲҢлҹ¬ л§җн•ҳм„ёмҡ”');
                    micBtn.disabled = false;
                    break;

                case 'transcription':
                    if (data.text && data.text !== '...') {
                        addMessage('user', data.text);
                    }
                    setStatus('processing', 'GDк°Җ мғқк°Ғ мӨ‘...');
                    break;

                case 'response_start':
                    setStatus('speaking', 'GDк°Җ л§җн•ҳлҠ” мӨ‘...');
                    break;

                case 'response_text':
                    // н…ҚмҠӨнҠё мҠӨнҠёлҰ¬л°Қ (optional)
                    break;

                case 'response_end':
                    const metrics = data.metrics || {};
                    addMessage('gd', metrics.response_text || '');
                    showMetrics(metrics);
                    setStatus('connected', 'лҢҖнҷ” мҷ„лЈҢ - лӢӨмӢң л§җн•ҳм„ёмҡ”');
                    playCollectedAudio();
                    break;

                case 'error':
                    setStatus('disconnected', `мҳӨлҘҳ: ${data.message}`);
                    addMessage('gd', `вҡ пёҸ ${data.message}`);
                    break;
            }
        }

        // === мӢӨмӢңк°„ мҳӨл””мҳӨ мҠӨнҠёлҰ¬л°Қ мһ¬мғқ (м•Ҳм •нҷ” лІ„м „) ===
        let audioQueue = [];
        let isPlaying = false;
        let playbackAudioContext = null;
        let nextPlayTime = 0;
        let totalChunksReceived = 0;
        let totalChunksScheduled = 0;  // мҠӨмјҖмӨ„лҗң мІӯнҒ¬ мҲҳ
        let chunksFinished = 0;  // мһ¬мғқ мҷ„лЈҢлҗң мІӯнҒ¬ мҲҳ
        let firstChunkTime = 0;
        let isProcessingQueue = false;
        let responseComplete = false;
        let lastSourceNode = null;  // л§Ҳм§Җл§ү мҳӨл””мҳӨ мҶҢмҠӨ м¶”м Ғ

        async function initPlaybackContext() {
            if (!playbackAudioContext || playbackAudioContext.state === 'closed') {
                playbackAudioContext = new AudioContext({ sampleRate: 24000 });
                nextPlayTime = 0;
            }
            if (playbackAudioContext.state === 'suspended') {
                await playbackAudioContext.resume();
            }
            return playbackAudioContext;
        }

        async function handleAudioChunk(blob) {
            totalChunksReceived++;

            // мІ« мІӯнҒ¬ мӢңк°„ кё°лЎқ
            if (totalChunksReceived === 1) {
                firstChunkTime = Date.now();
                debugEl.textContent = `рҹҺө мІ« мҳӨл””мҳӨ мҲҳмӢ ! TTFA мёЎм • мӨ‘...`;
                await initPlaybackContext();
                nextPlayTime = playbackAudioContext.currentTime;
            }

            // PCM лҚ°мқҙн„° м¶”м¶ң
            const arrayBuffer = await blob.arrayBuffer();
            console.log(`Chunk ${totalChunksReceived}: ${arrayBuffer.byteLength} bytes received`);
            const pcmData = new Int16Array(arrayBuffer);

            // Float32лЎң ліҖнҷҳ (м •к·ңнҷ”)
            const floatData = new Float32Array(pcmData.length);
            for (let i = 0; i < pcmData.length; i++) {
                floatData[i] = pcmData[i] / 32768.0;
            }

            // нҒҗм—җ м¶”к°Җ
            audioQueue.push(floatData);

            debugEl.textContent = `рҹҺө мІӯнҒ¬ ${totalChunksReceived}к°ң мҲҳмӢ `;

            // мҰүмӢң мһ¬мғқ мӢңмһ‘
            if (!isProcessingQueue) {
                processAudioQueue();
            }
        }

        async function processAudioQueue() {
            if (isProcessingQueue) return;
            isProcessingQueue = true;
            isPlaying = true;

            const ctx = await initPlaybackContext();

            while (audioQueue.length > 0) {
                const floatData = audioQueue.shift();
                totalChunksScheduled++;
                const chunkNum = totalChunksScheduled;

                // AudioBuffer мғқм„ұ
                const audioBuffer = ctx.createBuffer(1, floatData.length, 24000);
                audioBuffer.getChannelData(0).set(floatData);

                // мһ¬мғқ мҠӨмјҖмӨ„л§Ғ
                const startTime = Math.max(ctx.currentTime + 0.01, nextPlayTime);

                const source = ctx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ctx.destination);

                // мһ¬мғқ мҷ„лЈҢ м¶”м Ғ
                source.onended = () => {
                    chunksFinished++;
                    console.log(`Chunk #${chunkNum} finished (${chunksFinished}/${totalChunksScheduled})`);

                    // мқ‘лӢө мҷ„лЈҢ + лӘЁл“  мІӯнҒ¬ мһ¬мғқ мҷ„лЈҢ мӢң лҰ¬м…Ӣ
                    if (responseComplete && chunksFinished >= totalChunksScheduled) {
                        console.log('All audio chunks finished, resetting...');
                        setTimeout(() => resetAudioPlayback(), 300);
                    }
                };

                source.start(startTime);
                lastSourceNode = source;
                nextPlayTime = startTime + audioBuffer.duration;

                console.log(`Chunk #${chunkNum} scheduled at ${startTime.toFixed(2)}s, duration: ${audioBuffer.duration.toFixed(2)}s`);
            }

            isProcessingQueue = false;
        }

        function resetAudioPlayback() {
            console.log(`Reset: received=${totalChunksReceived}, scheduled=${totalChunksScheduled}, finished=${chunksFinished}`);
            audioQueue = [];
            isPlaying = false;
            isProcessingQueue = false;
            totalChunksReceived = 0;
            totalChunksScheduled = 0;
            chunksFinished = 0;
            firstChunkTime = 0;
            nextPlayTime = 0;
            responseComplete = false;
            lastSourceNode = null;
        }

        // мқ‘лӢө мҷ„лЈҢ мӢң нҳём¶ң
        async function playCollectedAudio() {
            console.log(`Response complete! Received: ${totalChunksReceived}, Scheduled: ${totalChunksScheduled}, Finished: ${chunksFinished}`);
            responseComplete = true;

            // м•„м§Ғ нҒҗм—җ лӮЁмқҖ мІӯнҒ¬к°Җ мһҲмңјл©ҙ мІҳлҰ¬
            if (audioQueue.length > 0 && !isProcessingQueue) {
                await processAudioQueue();
            }

            debugEl.textContent = `вң… мқ‘лӢө мҷ„лЈҢ: ${totalChunksScheduled}к°ң мІӯнҒ¬ мһ¬мғқ мӨ‘...`;

            // лӘЁл“  мІӯнҒ¬к°Җ мқҙлҜё мһ¬мғқ мҷ„лЈҢлҗң кІҪмҡ° л°”лЎң лҰ¬м…Ӣ
            if (chunksFinished >= totalChunksScheduled && totalChunksScheduled > 0) {
                console.log('All chunks already finished, resetting immediately');
                setTimeout(() => resetAudioPlayback(), 300);
            }
            // м•„м§Ғ мһ¬мғқ мӨ‘мқҙл©ҙ onended мҪңл°ұм—җм„ң лҰ¬м…Ӣ мІҳлҰ¬
        }

        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * bitsPerSample / 8;
            const blockAlign = numChannels * bitsPerSample / 8;
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // WAV н—ӨлҚ”
            const writeString = (offset, str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            // PCM лҚ°мқҙн„°
            const pcmView = new Uint8Array(buffer, 44);
            pcmView.set(pcmData);

            return new Blob([buffer], { type: 'audio/wav' });
        }

        // === л§ҲмқҙнҒ¬ л…№мқҢ ===
        async function startRecording() {
            try {
                // лёҢлқјмҡ°м Җ кё°ліё мғҳн”Ңл ҲмқҙнҠё мӮ¬мҡ© (ліҙнҶө 44100 лҳҗлҠ” 48000)
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                // AudioContext мғқм„ұ (лёҢлқјмҡ°м Җ кё°ліё мғҳн”Ңл ҲмқҙнҠё мӮ¬мҡ©)
                audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                debugEl.textContent = `мғҳн”Ңл ҲмқҙнҠё: ${audioContext.sampleRate}Hz`;

                // MediaRecorder м„Өм •
                const options = { mimeType: 'audio/webm;codecs=opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'audio/webm';
                }
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const recordingDuration = Date.now() - recordingStartTime;
                    debugEl.textContent = `л…№мқҢ мӢңк°„: ${recordingDuration}ms, мІӯнҒ¬: ${audioChunks.length}к°ң`;

                    if (audioChunks.length > 0 && recordingDuration > 500) {
                        await sendAudio();
                    } else {
                        setStatus('connected', 'л„Ҳл¬ҙ м§§мқҢ - лӢӨмӢң л§җн•ҳм„ёмҡ”');
                    }
                };

                mediaRecorder.start(250); // 250ms мІӯнҒ¬
                isRecording = true;
                recordingStartTime = Date.now();
                lastSoundTime = Date.now();
                hasSpeechStarted = false;
                micBtn.classList.add('active');
                setStatus('listening', 'л“ЈлҠ” мӨ‘... л§җм”Җн•ҳм„ёмҡ”');

                // мӢңк°Ғнҷ” мӢңмһ‘
                visualize();

                // м№Ёл¬ө к°җм§Җ мӢңмһ‘ (мөңмҶҢ л…№мқҢ мӢңк°„ нӣ„)
                const minRecordTime = parseInt(document.getElementById('minRecordTime').value) || 1000;
                setTimeout(() => {
                    if (isRecording) {
                        detectSilence();
                    }
                }, minRecordTime);

            } catch (err) {
                console.error('Microphone error:', err);
                setStatus('disconnected', 'л§ҲмқҙнҒ¬ м ‘к·ј мҳӨлҘҳ: ' + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
            }
            isRecording = false;
            micBtn.classList.remove('active');
            clearTimeout(silenceTimer);
        }

        // === м№Ёл¬ө к°җм§Җ (VAD) ===
        function detectSilence() {
            if (!isRecording || !analyser) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const threshold = 10; // м№Ёл¬ө мһ„кі„к°’ (лӮ®м¶Ө)
            const silenceTime = parseInt(document.getElementById('silenceThreshold').value) || 1500;
            const minRecordTime = parseInt(document.getElementById('minRecordTime').value) || 1000;
            const recordingDuration = Date.now() - recordingStartTime;

            // мқҢм„ұмқҙ к°җм§Җлҗҳл©ҙ н‘ңмӢң
            if (average > threshold) {
                lastSoundTime = Date.now();
                hasSpeechStarted = true;
                instructionEl.textContent = `л§җн•ҳлҠ” мӨ‘... (ліјлҘЁ: ${Math.round(average)})`;
            } else {
                const silenceDuration = Date.now() - lastSoundTime;
                instructionEl.textContent = `м№Ёл¬ө ${(silenceDuration/1000).toFixed(1)}мҙҲ... (ліјлҘЁ: ${Math.round(average)})`;

                // мөңмҶҢ л…№мқҢ мӢңк°„ мқҙнӣ„ + мқҢм„ұ мӢңмһ‘лҗЁ + м№Ёл¬ө м§ҖмҶҚ
                if (recordingDuration > minRecordTime && hasSpeechStarted && silenceDuration > silenceTime) {
                    console.log(`Silence detected after ${recordingDuration}ms recording, sending audio...`);
                    stopRecording();
                    return;
                }
            }

            requestAnimationFrame(detectSilence);
        }

        // === мҳӨл””мҳӨ мӢңк°Ғнҷ” ===
        function visualize() {
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            function draw() {
                if (!isRecording) {
                    canvasCtx.fillStyle = 'rgba(255,255,255,0.1)';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                    return;
                }

                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = 'rgba(26, 26, 46, 0.3)';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    const hue = (i / bufferLength) * 120 + 200;
                    canvasCtx.fillStyle = `hsl(${hue}, 70%, 60%)`;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }

            draw();
        }

        // === мҳӨл””мҳӨ м „мҶЎ ===
        async function sendAudio() {
            if (audioChunks.length === 0) return;

            setStatus('processing', 'мқҢм„ұ мІҳлҰ¬ мӨ‘...');

            // WebM Blob мғқм„ұ
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            audioChunks = [];

            debugEl.textContent = `м „мҶЎ мӨ‘: ${(blob.size / 1024).toFixed(1)}KB`;

            try {
                const arrayBuffer = await blob.arrayBuffer();

                // AudioContextк°Җ лӢ«нҳҖмһҲмңјл©ҙ мғҲлЎң мғқм„ұ
                if (!audioContext || audioContext.state === 'closed') {
                    audioContext = new AudioContext();
                }

                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));

                debugEl.textContent = `л””мҪ”л”©: ${audioBuffer.duration.toFixed(2)}s @ ${audioBuffer.sampleRate}Hz`;

                // 16kHzлЎң лҰ¬мғҳн”Ңл§Ғ
                const targetSampleRate = 16000;
                const resampled = resampleAudio(audioBuffer, targetSampleRate);

                // PCM 16-bitлЎң ліҖнҷҳ
                const pcmData = audioBufferToPcm16(resampled);
                const base64 = arrayBufferToBase64(pcmData);

                debugEl.textContent = `м „мҶЎ: ${(pcmData.byteLength / 1024).toFixed(1)}KB PCM (${(resampled.length / targetSampleRate).toFixed(2)}s)`;

                // WebSocketмңјлЎң м „мҶЎ (мәҗлҰӯн„° м •ліҙ нҸ¬н•Ё)
                const params = new URLSearchParams(window.location.search);
                ws.send(JSON.stringify({
                    type: 'voice_input',
                    audio: base64,
                    voice_id: document.getElementById('voiceId').value,
                    character: params.get('character') || 'gd'
                }));

            } catch (err) {
                console.error('Audio processing error:', err);
                setStatus('disconnected', 'мҳӨл””мҳӨ мІҳлҰ¬ мҳӨлҘҳ: ' + err.message);
                debugEl.textContent = `мҳӨлҘҳ: ${err.message}`;
            }
        }

        // лҰ¬мғҳн”Ңл§Ғ н•ЁмҲҳ (лёҢлқјмҡ°м Җ мғҳн”Ңл ҲмқҙнҠё вҶ’ 16kHz)
        function resampleAudio(audioBuffer, targetSampleRate) {
            const sourceSampleRate = audioBuffer.sampleRate;
            const sourceData = audioBuffer.getChannelData(0);

            if (sourceSampleRate === targetSampleRate) {
                return sourceData;
            }

            const ratio = sourceSampleRate / targetSampleRate;
            const newLength = Math.round(sourceData.length / ratio);
            const result = new Float32Array(newLength);

            for (let i = 0; i < newLength; i++) {
                const sourceIndex = i * ratio;
                const index = Math.floor(sourceIndex);
                const fraction = sourceIndex - index;

                if (index + 1 < sourceData.length) {
                    // м„ нҳ• ліҙк°„
                    result[i] = sourceData[index] * (1 - fraction) + sourceData[index + 1] * fraction;
                } else {
                    result[i] = sourceData[index];
                }
            }

            return result;
        }

        function audioBufferToPcm16(samples) {
            const pcm = new Int16Array(samples.length);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm.buffer;
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // === UI н—¬нҚј ===
        function setStatus(state, text) {
            statusEl.className = `status ${state}`;
            statusEl.textContent = text;
        }

        function addMessage(role, text) {
            if (!text || text === '...') return;
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const charName = currentCharacter ? currentCharacter.name : 'AI';
            div.innerHTML = `<div class="label">${role === 'user' ? 'лӮҳ' : charName}</div>${text}`;
            conversationEl.appendChild(div);
            conversationEl.scrollTop = conversationEl.scrollHeight;
        }

        function showMetrics(m) {
            metricsEl.innerHTML = `STT: ${m.stt_ms || 0}ms | LLM: ${m.llm_ttfa_ms || 0}ms | Total: ${m.total_ms || 0}ms`;
        }

        function resetConversation() {
            conversationEl.innerHTML = '';
            metricsEl.innerHTML = '';
            debugEl.innerHTML = '';
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'reset' }));
            }
        }

        function toggleSettings() {
            const settings = document.getElementById('settings');
            settings.style.display = settings.style.display === 'none' ? 'block' : 'none';
        }

        // === мқҙлІӨнҠё н•ёл“Өлҹ¬ ===
        micBtn.onclick = () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        };

        // === мәҗлҰӯн„° м •ліҙ лЎңл“ң ===
        let currentCharacter = null;

        async function loadCharacterInfo() {
            const params = new URLSearchParams(window.location.search);
            const charId = params.get('character') || 'gd';
            const voiceMode = params.get('voice_mode') || 'auto';

            // мқҢм„ұ ID м„Өм •
            const voiceIdSelect = document.getElementById('voiceId');
            if (voiceMode === 'finetuned') {
                voiceIdSelect.value = 'gd-default';
            } else if (voiceMode === 'icl') {
                voiceIdSelect.value = 'gd-icl';
            }

            try {
                const response = await fetch(`/api/v1/characters/${charId}`);
                if (response.ok) {
                    const data = await response.json();
                    currentCharacter = data.character;

                    // UI м—…лҚ°мқҙнҠё
                    document.getElementById('charName').textContent = currentCharacter.name;
                    document.getElementById('charAvatar').textContent =
                        charId === 'gd' ? 'рҹ‘‘' : (charId === 'jhk' ? 'рҹ‘”' : 'рҹ‘Ө');
                    document.title = `${currentCharacter.name} - Voice Call`;
                }
            } catch (e) {
                console.error('Failed to load character:', e);
            }
        }

        // === мҙҲкё°нҷ” ===
        loadCharacterInfo();
        connect();
    </script>
</body>
