<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD 음성통화</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .status {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            min-height: 20px;
        }

        .status.connected { color: #4ade80; }
        .status.speaking { color: #facc15; }
        .status.responding { color: #60a5fa; }
        .status.error { color: #f87171; }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(59, 130, 246, 0.5);
        }

        .mic-button.recording {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.5);
            animation: pulse 1.5s infinite;
        }

        .mic-button.disabled {
            background: #4b5563;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .mic-icon {
            width: 48px;
            height: 48px;
        }

        .level-meter {
            width: 200px;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .level-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4ade80, #facc15, #ef4444);
            transition: width 0.05s ease-out;
        }

        .transcript {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            min-height: 100px;
            margin-bottom: 20px;
            text-align: left;
        }

        .transcript-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .transcript-text {
            font-size: 16px;
            line-height: 1.5;
            color: #e0e0e0;
            min-height: 40px;
        }

        .transcript-text.ai {
            color: #60a5fa;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .control-btn {
            padding: 10px 20px;
            border: 1px solid #4b5563;
            background: transparent;
            color: #9ca3af;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            border-color: #6b7280;
            color: #e0e0e0;
        }

        .metrics {
            font-size: 11px;
            color: #666;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GD 음성통화</h1>
        <div class="status" id="status">연결 중...</div>

        <button class="mic-button disabled" id="micBtn">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>

        <div class="level-meter">
            <div class="level-bar" id="levelBar"></div>
        </div>

        <div class="transcript">
            <div class="transcript-label">나</div>
            <div class="transcript-text" id="userText">마이크 버튼을 눌러 대화를 시작하세요</div>
        </div>

        <div class="transcript">
            <div class="transcript-label">GD</div>
            <div class="transcript-text ai" id="aiText">-</div>
        </div>

        <div class="controls">
            <button class="control-btn" id="resetBtn">대화 초기화</button>
        </div>

        <div class="metrics" id="metrics"></div>
    </div>

    <script>
    // === 설정 ===
    const CONFIG = {
        WS_URL: 'ws://10.100.100.10:5002/ws/voice/call',
        SAMPLE_RATE: 24000,          // 서버 출력 샘플레이트
        INPUT_SAMPLE_RATE: 16000,    // 입력 샘플레이트
        VOICE_ID: 'gd-default',
        BUFFER_THRESHOLD: 3,         // 청크 버퍼 임계값 (재생 시작 전)
        RECONNECT_DELAY: 1000,
        MAX_RECONNECT_ATTEMPTS: 5,
    };

    // === 상태 ===
    let ws = null;
    let isConnected = false;
    let isRecording = false;
    let mediaStream = null;
    let mediaRecorder = null;
    let audioContext = null;
    let reconnectAttempts = 0;

    // === 오디오 플레이어 (안정적 스트리밍) ===
    class AudioStreamPlayer {
        constructor(sampleRate = 24000) {
            this.sampleRate = sampleRate;
            this.audioContext = null;
            this.chunks = [];
            this.isPlaying = false;
            this.nextPlayTime = 0;
            this.bufferThreshold = CONFIG.BUFFER_THRESHOLD;
        }

        init() {
            if (!this.audioContext) {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: this.sampleRate
                });
            }
            return this.audioContext;
        }

        addChunk(pcmData) {
            this.chunks.push(pcmData);

            // 버퍼가 임계값에 도달하면 재생 시작
            if (!this.isPlaying && this.chunks.length >= this.bufferThreshold) {
                this.startPlayback();
            }
        }

        startPlayback() {
            if (this.isPlaying) return;
            this.isPlaying = true;
            this.nextPlayTime = this.audioContext.currentTime + 0.05; // 50ms 초기 지연
            this.processQueue();
        }

        processQueue() {
            if (!this.isPlaying) return;

            while (this.chunks.length > 0) {
                const pcmData = this.chunks.shift();
                this.scheduleChunk(pcmData);
            }

            // 큐가 비었으면 잠시 후 다시 체크
            if (this.isPlaying) {
                setTimeout(() => this.processQueue(), 20);
            }
        }

        scheduleChunk(pcmData) {
            const ctx = this.audioContext;
            const samples = new Int16Array(pcmData.buffer, pcmData.byteOffset, pcmData.length / 2);
            const floatSamples = new Float32Array(samples.length);

            for (let i = 0; i < samples.length; i++) {
                floatSamples[i] = samples[i] / 32768.0;
            }

            const buffer = ctx.createBuffer(1, floatSamples.length, this.sampleRate);
            buffer.getChannelData(0).set(floatSamples);

            const source = ctx.createBufferSource();
            source.buffer = buffer;
            source.connect(ctx.destination);

            // 현재 시간보다 과거면 즉시 재생
            if (this.nextPlayTime < ctx.currentTime) {
                this.nextPlayTime = ctx.currentTime + 0.01;
            }

            source.start(this.nextPlayTime);
            this.nextPlayTime += buffer.duration;
        }

        stop() {
            this.isPlaying = false;
            this.chunks = [];
            this.nextPlayTime = 0;
        }

        reset() {
            this.stop();
        }
    }

    const audioPlayer = new AudioStreamPlayer(CONFIG.SAMPLE_RATE);

    // === DOM 요소 ===
    const statusEl = document.getElementById('status');
    const micBtn = document.getElementById('micBtn');
    const levelBar = document.getElementById('levelBar');
    const userText = document.getElementById('userText');
    const aiText = document.getElementById('aiText');
    const resetBtn = document.getElementById('resetBtn');
    const metricsEl = document.getElementById('metrics');

    // === 상태 업데이트 ===
    function setStatus(text, type = '') {
        statusEl.textContent = text;
        statusEl.className = 'status ' + type;
    }

    // === WebSocket 연결 ===
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) return;

        setStatus('연결 중...');
        ws = new WebSocket(CONFIG.WS_URL);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            isConnected = true;
            reconnectAttempts = 0;
            setStatus('연결됨 - 마이크를 눌러 대화하세요', 'connected');
            micBtn.classList.remove('disabled');
        };

        ws.onmessage = (event) => {
            if (event.data instanceof ArrayBuffer) {
                // 바이너리 오디오 데이터
                const data = new Uint8Array(event.data);
                audioPlayer.addChunk(data);
            } else {
                // JSON 메시지
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('메시지 파싱 오류:', e);
                }
            }
        };

        ws.onclose = () => {
            isConnected = false;
            micBtn.classList.add('disabled');

            if (reconnectAttempts < CONFIG.MAX_RECONNECT_ATTEMPTS) {
                const delay = CONFIG.RECONNECT_DELAY * Math.pow(2, reconnectAttempts);
                setStatus(`연결 끊김 - ${delay/1000}초 후 재연결...`, 'error');
                reconnectAttempts++;
                setTimeout(connect, delay);
            } else {
                setStatus('연결 실패 - 새로고침 해주세요', 'error');
            }
        };

        ws.onerror = (err) => {
            console.error('WebSocket 오류:', err);
            setStatus('연결 오류', 'error');
        };
    }

    // === 메시지 처리 ===
    function handleMessage(msg) {
        switch (msg.type) {
            case 'transcription':
                userText.textContent = msg.text || '...';
                setStatus('응답 생성 중...', 'responding');
                break;

            case 'response_start':
                aiText.textContent = '';
                audioPlayer.init();
                audioPlayer.reset();
                break;

            case 'response_text':
                aiText.textContent += msg.text || '';
                break;

            case 'response_end':
                setStatus('연결됨 - 마이크를 눌러 대화하세요', 'connected');
                if (msg.metrics) {
                    metricsEl.textContent = `STT: ${msg.metrics.stt_ms}ms | LLM: ${msg.metrics.llm_ttfa_ms}ms | TTS: ${msg.metrics.tts_ttfa_ms}ms | 총: ${msg.metrics.total_ms}ms`;
                }
                break;

            case 'error':
                setStatus(`오류: ${msg.message || '알 수 없는 오류'}`, 'error');
                break;

            case 'pong':
                // 핑퐁 응답
                break;
        }
    }

    // === 마이크 녹음 ===
    async function startRecording() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: CONFIG.INPUT_SAMPLE_RATE,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                }
            });

            // 레벨 미터 설정
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(mediaStream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function updateLevel() {
                if (!isRecording) return;
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
                levelBar.style.width = Math.min(100, avg * 1.5) + '%';
                requestAnimationFrame(updateLevel);
            }
            updateLevel();

            // MediaRecorder 설정
            mediaRecorder = new MediaRecorder(mediaStream, {
                mimeType: 'audio/webm;codecs=opus'
            });

            const chunks = [];
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    chunks.push(e.data);
                }
            };

            mediaRecorder.onstop = async () => {
                levelBar.style.width = '0%';

                if (chunks.length > 0) {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const arrayBuffer = await blob.arrayBuffer();

                    // 서버에 전송
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        setStatus('음성 인식 중...', 'speaking');
                        ws.send(JSON.stringify({
                            type: 'voice_input',
                            audio: arrayBufferToBase64(arrayBuffer),
                            format: 'webm',
                            sample_rate: CONFIG.INPUT_SAMPLE_RATE,
                            voice_id: CONFIG.VOICE_ID,
                        }));
                    }
                }

                // 정리
                mediaStream.getTracks().forEach(track => track.stop());
                audioCtx.close();
            };

            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
            setStatus('듣고 있어요...', 'speaking');

        } catch (err) {
            console.error('마이크 접근 오류:', err);
            setStatus('마이크 접근 권한이 필요합니다', 'error');
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        isRecording = false;
        micBtn.classList.remove('recording');
    }

    // === 유틸리티 ===
    function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    // === 이벤트 리스너 ===
    micBtn.addEventListener('mousedown', () => {
        if (!isConnected) return;
        startRecording();
    });

    micBtn.addEventListener('mouseup', () => {
        if (isRecording) stopRecording();
    });

    micBtn.addEventListener('mouseleave', () => {
        if (isRecording) stopRecording();
    });

    // 터치 지원
    micBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!isConnected) return;
        startRecording();
    });

    micBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (isRecording) stopRecording();
    });

    // 대화 초기화
    resetBtn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'reset' }));
            userText.textContent = '마이크 버튼을 눌러 대화를 시작하세요';
            aiText.textContent = '-';
            metricsEl.textContent = '';
            setStatus('대화가 초기화되었습니다', 'connected');
        }
    });

    // === 초기화 ===
    connect();

    // 핑 전송 (연결 유지)
    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
        }
    }, 30000);
    </script>
</body>
</html>
